// ── Scoring algorithm ────────────────────────────────────────────────────────
function scoreSchool(school, answers) {
  let score = 0;

  // GPA match
  const gpaMap = { "3.8 – 4.0": 3.9, "3.5 – 3.79": 3.65, "3.0 – 3.49": 3.25, "2.5 – 2.99": 2.75, "Below 2.5": 2.2 };
  const studentGPA = gpaMap[answers.gpa] || 3.5;
  const gpaDiff = school.avg_gpa - studentGPA;
  if (gpaDiff <= -0.4) score += 15; // safety
  else if (gpaDiff <= 0.1) score += 10; // match
  else if (gpaDiff <= 0.4) score += 5; // slight reach

  // SAT match
  const satMap = { "SAT 1400+ / ACT 31+": 1430, "SAT 1200–1399 / ACT 26–30": 1300, "SAT 1000–1199 / ACT 20–25": 1100, "SAT below 1000 / ACT below 20": 950, "Test-optional / not yet taken": 1200 };
  const studentSAT = satMap[answers.test_score] || 1200;
  const satDiff = school.avg_sat - studentSAT;
  if (satDiff <= -100) score += 10;
  else if (satDiff <= 50) score += 8;
  else if (satDiff <= 150) score += 4;

  // Location preferences
  const locPref = answers.location_pref || [];
  if (locPref.includes("Open to anywhere in the US")) score += 8;
  if (locPref.includes("Anywhere in California") && school.state === "CA") score += 12;
  if (locPref.includes("West Coast") && ["CA","OR","WA"].includes(school.state)) score += 8;
  if (locPref.includes("East Coast") && ["NY","MA","PA","FL"].includes(school.state)) score += 8;
  if (locPref.includes("South / Southeast") && ["TX","LA","FL"].includes(school.state)) score += 8;
  if (locPref.includes("Midwest") && ["MI"].includes(school.state)) score += 8;

  // UC/CSU interest
  if (answers.state_school === "Yes — high priority" && school.state === "CA" && school.type === "Public") score += 10;
  if (answers.state_school === "Yes — as one option among many" && school.state === "CA" && school.type === "Public") score += 5;

  // Campus size
  if (answers.campus_size === school.size) score += 8;
  if (answers.campus_size === "No preference — doesn't matter") score += 3;

  // Campus setting
  const settingPref = answers.campus_setting || [];
  const settingNorm = settingPref.map(s => s.toLowerCase().replace(/ \/ /g, "/").replace(/ /g, ""));
  school.setting.forEach(s => {
    if (settingNorm.some(p => s.includes(p.split("/")[0]) || p.includes(s))) score += 4;
  });

  // Major match
  const majorPref = answers.major || [];
  majorPref.forEach(m => { if (school.majors.includes(m)) score += 6; });

  // Budget
  const budgetMap = { "Under $20,000/year": 20000, "$20,000 – $35,000/year": 35000, "$35,000 – $55,000/year": 55000, "$55,000+/year (private school tuition)": 100000, "Need maximum financial aid / merit scholarships": 25000 };
  const studentBudget = budgetMap[answers.budget] || 50000;
  if (school.cost <= studentBudget) score += 8;
  else if (school.cost <= studentBudget * 1.2) score += 3;

  // Features / culture
  const culturePref = answers.campus_culture || [];
  culturePref.forEach(c => { if (school.features.includes(c)) score += 4; });

  // Career/prestige
  const prestigePref = answers.prestige;
  if (prestigePref === "Very important — I want a highly ranked school" && ["elite","high"].includes(school.prestige)) score += 10;
  if (prestigePref === "Somewhat important" && ["elite","high","medium-high"].includes(school.prestige)) score += 5;
  if (prestigePref === "I care more about fit than rankings") score += 3;

  // Athletics
  if (answers.sports === "Yes — I plan to play Division I" && school.athletics === "D1") score += 8;
  if (answers.sports === "Yes — Division II or III" && ["D2","D3"].includes(school.athletics)) score += 8;

  // ROTC interest
  const rotcAnswer = answers.rotc || "";
  if (rotcAnswer && rotcAnswer !== "No / not interested" && rotcAnswer !== "Not sure / tell me more") {
    const hasAny = school.rotc && school.rotc.length > 0;
    const branchMap = {
      "Yes — Army ROTC": "Army",
      "Yes — Navy / Marine ROTC": "Navy",
      "Yes — Air Force ROTC": "AirForce",
      "Open to any ROTC branch": null,
    };
    const wantedBranch = branchMap[rotcAnswer];
    if (hasAny) {
      if (!wantedBranch || school.rotc.includes(wantedBranch)) score += 10;
      else score += 4; // has ROTC but different branch
    }
  }

  // Test-optional interest
  if ((answers.deal_breakers || []).includes("Must be test-optional") && !school.test_optional) return -999;

  // Auto-scholarship interest
  if ((answers.deal_breakers || []).includes("Must have automatic merit scholarships for OOS students")) {
    if (!school.auto_scholarship) score -= 10;
    else score += 12;
  } else if (school.auto_scholarship && (answers.fin_aid === "Critical — it will determine where I go" || answers.fin_aid === "Very important")) {
    score += 6; // bonus: has auto scholarships and student cares about aid
  }

  // Deal-breakers
  const dealBreakers = answers.deal_breakers || [];
  if (dealBreakers.includes("Must be in California") && school.state !== "CA") return -999;
  if (dealBreakers.includes("Must have ROTC program") && (!school.rotc || school.rotc.length === 0)) return -999;
  if (dealBreakers.includes("Must have strong Greek life") && !school.features.includes("Strong Greek life / social scene")) score -= 5;
  if (dealBreakers.includes("Must have no Greek life") && school.features.includes("Strong Greek life / social scene")) return -999;
  if (dealBreakers.includes("Must be religiously affiliated") && !school.features.includes("Religious / values-based environment")) score -= 8;
  if (dealBreakers.includes("Must be secular") && school.features.includes("Religious / values-based environment")) return -999;

  return score;
}

function classifyTier(school, answers) {
  const gpaMap = { "3.8 – 4.0": 3.9, "3.5 – 3.79": 3.65, "3.0 – 3.49": 3.25, "2.5 – 2.99": 2.75, "Below 2.5": 2.2 };
  const satMap = { "SAT 1400+ / ACT 31+": 1430, "SAT 1200–1399 / ACT 26–30": 1300, "SAT 1000–1199 / ACT 20–25": 1100, "SAT below 1000 / ACT below 20": 950, "Test-optional / not yet taken": 1200 };
  const sGPA = gpaMap[answers.gpa] || 3.5;
  const sSAT = satMap[answers.test_score] || 1200;
  const gpaDiff = school.avg_gpa - sGPA;
  const satDiff = school.avg_sat - sSAT;
  if (gpaDiff > 0.25 || satDiff > 120) return "reach";
  if (gpaDiff < -0.35 && satDiff < -100) return "safety";
  return "match";
}

function generateList(answers) {
  const scored = SCHOOL_DB.map(s => ({
    ...s,
    score: scoreSchool(s, answers),
    tier: classifyTier(s, answers),
  })).filter(s => s.score > 0).sort((a, b) => b.score - a.score);

  const reaches = scored.filter(s => s.tier === "reach").slice(0, 7);
  const matches = scored.filter(s => s.tier === "match").slice(0, 10);
  const safeties = scored.filter(s => s.tier === "safety").slice(0, 6);

  const total = [...reaches, ...matches, ...safeties];
  // Ensure 15-25 schools
  if (total.length < 15) {
    const extras = scored.filter(s => !total.find(t => t.name === s.name)).slice(0, 15 - total.length);
    return [...total, ...extras];
  }
  return total.slice(0, 25);
}

function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  const inputStyle = {
    width: "100%",
    padding: "12px 14px",
    border: `1.5px solid ${BRAND.lightSlate}`,
    borderRadius: 8,
    fontSize: 15,
    fontFamily: "inherit",
    color: BRAND.navy,
    background: BRAND.cream,
    boxSizing: "border-box",
    marginBottom: 14,
    outline: "none",
  };

  const handleSubmit = () => {
    if (!email || !password) { setError("Please fill in all fields."); return; }
    if (mode === "signup" && !name) { setError("Please enter your name."); return; }

    const key = `csa_user_${email}`;
    if (mode === "signup") {
      const existing = localStorage.getItem(key);
      if (existing) { setError("An account with this email already exists."); return; }
      const user = { name, email, password, createdAt: new Date().toISOString(), savedLists: [] };
      localStorage.setItem(key, JSON.stringify(user));
      onLogin(user);
    } else {
      const raw = localStorage.getItem(key);
      if (!raw) { setError("No account found. Please sign up."); return; }
      const user = JSON.parse(raw);
      if (user.password !== password) { setError("Incorrect password."); return; }
      onLogin(user);
    }
  };

  return (
    <div style={styles.app}>
      <header style={styles.header}>
        <div style={styles.logo}>
          <div style={styles.logoIcon}>🎓</div>

// ── Quiz ─────────────────────────────────────────────────────────────────────
function Quiz({ onComplete, onBack }) {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const q = QUESTIONS[idx];
  const pct = Math.round((idx / QUESTIONS.length) * 100);

  const toggle = (opt) => {
    if (q.type === "single") {
      setAnswers(a => ({ ...a, [q.id]: opt }));
    } else {
      setAnswers(a => {
        const cur = a[q.id] || [];
        return { ...a, [q.id]: cur.includes(opt) ? cur.filter(x => x !== opt) : [...cur, opt] };
      });
    }
  };

  const isSelected = (opt) => q.type === "single" ? answers[q.id] === opt : (answers[q.id] || []).includes(opt);
  const canNext = q.type === "single" ? !!answers[q.id] : (answers[q.id] || []).length > 0;

  const next = () => { if (idx < QUESTIONS.length - 1) setIdx(i => i + 1); else onComplete(answers); };
  const prev = () => { if (idx > 0) setIdx(i => i - 1); };

  return (
    <div style={styles.app}>
      <header style={styles.header}>
        <div style={styles.logo}>
          <div style={styles.logoIcon}>🎓</div>
          <div>
            <div style={styles.logoText}>College Smart Advising</div>
            <div style={styles.logoSub}>College List Builder</div>
          </div>
        </div>
        <button style={styles.btnSecondary} onClick={onBack}>← Dashboard</button>
      </header>
      <div style={styles.main}>
        <div style={{ marginBottom: 8, display: "flex", justifyContent: "space-between", fontSize: 13, color: BRAND.slate }}>
          <span>Question {idx + 1} of {QUESTIONS.length}</span>
          <span>{pct}% complete</span>
        </div>
        <div style={styles.progressBar}><div style={styles.progressFill(pct)} /></div>

        <div style={styles.card}>
          <div style={styles.categoryBadge}>{q.icon} {q.category}</div>
          <div style={styles.questionText}>{q.text}</div>
          {q.type === "multi" && <div style={{ fontSize: 12, color: BRAND.slate, marginBottom: 16, fontStyle: "italic" }}>Select all that apply</div>}

          {q.options.map(opt => (
            <button key={opt} style={styles.optionBtn(isSelected(opt))} onClick={() => toggle(opt)}>
              <div style={styles.checkCircle(isSelected(opt))}>
                {isSelected(opt) && <span style={{ color: BRAND.white, fontSize: 12, lineHeight: 1 }}>✓</span>}
              </div>
              {opt}
            </button>
          ))}

          {q.id === "rotc" && answers.rotc === "Not sure / tell me more" && (
            <div style={{ background: "#EBF8FF", border: "1px solid #BEE3F8", borderRadius: 10, padding: "12px 16px", marginTop: 8, fontSize: 13, color: "#2C5282", lineHeight: 1.6 }}>
              <strong>🎖️ About ROTC Scholarships:</strong> ROTC (Reserve Officers' Training Corps) programs offer full or partial scholarships covering tuition, fees, and a monthly stipend in exchange for a service commitment after graduation. Army, Navy/Marine, and Air Force each run their own programs — most major universities have at least one branch on campus. Your counselor can discuss whether this is a good fit for your goals.
            </div>
          )}

          <div style={styles.navRow}>
            <button style={styles.btnSecondary} onClick={prev} disabled={idx === 0}>← Back</button>
            <button
              style={{ ...styles.btnPrimary, opacity: canNext ? 1 : 0.4, cursor: canNext ? "pointer" : "not-allowed" }}
              onClick={next}
              disabled={!canNext}
            >
              {idx === QUESTIONS.length - 1 ? "Generate My List 🎉" : "Next →"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

                    📍 {s.state} &nbsp;·&nbsp; {s.size.charAt(0).toUpperCase() + s.size.slice(1)} university &nbsp;·&nbsp; Avg GPA {s.avg_gpa} &nbsp;·&nbsp; Avg SAT {s.avg_sat}
                  </div>
                  <div style={styles.schoolDesc}>{s.description}</div>
                  <div style={{ marginTop: 8, display: "flex", flexWrap: "wrap", gap: 5 }}>
                    {s.features.slice(0, 3).map(f => (
                      <span key={f} style={{ fontSize: 11, background: `${BRAND.navy}10`, color: BRAND.navy, padding: "2px 8px", borderRadius: 10 }}>{f}</span>
                    ))}
                    {s.test_optional && (
                      <span style={{ fontSize: 11, background: "#EBF8FF", color: "#2B6CB0", padding: "2px 8px", borderRadius: 10, fontWeight: "bold" }}>✓ Test-Optional</span>
                    )}
                    {s.rotc && s.rotc.length > 0 && (
                      <span style={{ fontSize: 11, background: "#F0FFF4", color: "#276749", padding: "2px 8px", borderRadius: 10, fontWeight: "bold" }}>🎖️ ROTC: {s.rotc.join(", ")}</span>
                    )}
                  </div>
                  {s.auto_scholarship && (
                    <div style={{ marginTop: 6, fontSize: 12, color: "#744210", background: "#FFFBEB", border: "1px solid #F6E05E", borderRadius: 8, padding: "5px 10px" }}>
                      💰 <strong>OOS Merit:</strong> {s.auto_scholarship}
                    </div>
                  )}
                </div>
                <div style={styles.schoolType(s.type)}>{s.type}</div>
              </div>
            ))}
          </div>
        ))}

        <div style={{ ...styles.card, textAlign: "center", padding: "28px", background: `${BRAND.navy}08` }}>
          <div style={{ fontSize: 20, fontWeight: "bold", color: BRAND.navy, marginBottom: 8 }}>Ready to take the next step?</div>
          <p style={{ color: BRAND.slate, fontSize: 14, marginBottom: 16 }}>Schedule a session with your College Smart Advising counselor to review this list in detail.</p>
          <a href="https://collegesmartadvising.com" target="_blank" style={{ ...styles.btnPrimary, textDecoration: "none", display: "inline-block" }}>
            Visit College Smart Advising →
          </a>
        </div>
      </div>
    </div>
  );
}

// ── Root App ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("auth"); // auth | dashboard | quiz | results
  const [user, setUser] = useState(null);
  const [resultSchools, setResultSchools] = useState(null);
  const [quizAnswers, setQuizAnswers] = useState(null);

  const handleLogin = (u) => { setUser(u); setScreen("dashboard"); };
  const handleLogout = () => { setUser(null); setScreen("auth"); };

  const handleQuizComplete = (answers) => {
    const schools = generateList(answers);
    setQuizAnswers(answers);
    setResultSchools(schools);

    // Save to user account
    const updated = {
      ...user,
      savedLists: [...(user.savedLists || []), { date: new Date().toISOString(), schools, answers }],
    };
    setUser(updated);
    localStorage.setItem(`csa_user_${user.email}`, JSON.stringify(updated));
    setScreen("results");
  };

  // Restore saved list on login
  const handleViewList = () => {
    if (user?.savedLists?.length > 0) {
      const last = user.savedLists[user.savedLists.length - 1];
      setResultSchools(last.schools);
      setQuizAnswers(last.answers);
      setScreen("results");
    }
  };

  if (screen === "auth") return <AuthScreen onLogin={handleLogin} />;
  if (screen === "dashboard") return <Dashboard user={user} onStartQuiz={() => setScreen("quiz")} onViewList={handleViewList} onLogout={handleLogout} />;
  if (screen === "quiz") return <Quiz onComplete={handleQuizComplete} onBack={() => setScreen("dashboard")} />;
  if (screen === "results") return <Results schools={resultSchools} user={user} answers={quizAnswers} onBack={() => setScreen("dashboard")} onRetake={() => setScreen("quiz")} />;
  return null;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
